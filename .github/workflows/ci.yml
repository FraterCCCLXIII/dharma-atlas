name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run test
      - run: npm run build
        env:
          DATABASE_URL: postgresql://build:build@127.0.0.1:5432/build
          BETTER_AUTH_SECRET: ci-build-placeholder-secret-32chars
          BETTER_AUTH_URL: http://localhost:3000
