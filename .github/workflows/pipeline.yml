name: Pipeline

on:
  schedule:
    - cron: "0 6 * * 0"
  workflow_dispatch:

jobs:
  pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Run places pipeline (quick)
        run: npm run pipeline:places -- --quick
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
